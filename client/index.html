<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- =====================================================================
         DEFAULT SEO & SOCIAL META TAGS
         These are static fallbacks read by WhatsApp, Facebook, Twitter/X,
         LinkedIn and any other crawler that does NOT execute JavaScript.
         React Helmet (SEOHead.jsx) overrides these at runtime for dynamic
         per-page values — both layers are intentional and correct.
         ===================================================================== -->
    <meta name="description" content="Use free online AI, media, image, text and productivity tools at Global Tech Tools. Fast, secure and easy to use." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn, Telegram, Discord) -->
    <meta property="og:type"              content="website" />
    <meta property="og:site_name"         content="Global Tech Tools" />
    <meta property="og:locale"            content="en_US" />
    <meta property="og:title"             content="Global Tech Tools — Free AI Tools for Writers &amp; Students" />
    <meta property="og:description"       content="Use free online AI, media, image, text and productivity tools at Global Tech Tools. Fast, secure and easy to use." />
    <meta property="og:url"               content="https://globaltechtool.com/" />
    <meta property="og:image"             content="https://globaltechtool.com/og-image.png" />
    <meta property="og:image:secure_url"  content="https://globaltechtool.com/og-image.png" />
    <meta property="og:image:type"        content="image/png" />
    <meta property="og:image:width"       content="1200" />
    <meta property="og:image:height"      content="630" />
    <meta property="og:image:alt"         content="Global Tech Tools preview image" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"             content="summary_large_image" />
    <meta name="twitter:title"            content="Global Tech Tools — Free AI Tools for Writers &amp; Students" />
    <meta name="twitter:description"      content="Use free online AI, media, image, text and productivity tools at Global Tech Tools. Fast, secure and easy to use." />
    <meta name="twitter:image"            content="https://globaltechtool.com/og-image.png" />
    <meta name="twitter:image:alt"        content="Global Tech Tools preview image" />

    <!--
      GOOGLE SEARCH CONSOLE VERIFICATION
      ===================================
      Method A — HTML meta tag (easiest):
        Add the verification meta tag from GSC directly below this comment:
          <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />
        Then push — Vercel deploys in ~60 seconds.

      Method B — DNS TXT record (recommended — covers www + non-www):
        1. Go to search.google.com/search-console → Add Property → Domain
        2. Enter: globaltechtool.com
        3. Copy the TXT record value Google provides
        4. Log in to your DNS registrar for globaltechtool.com
        5. Add a new TXT record:
             Name/Host: @  (or leave blank)
             Value: google-site-verification=XXXXXXXXXXXXXXXX
             TTL: 3600 (or Auto)
        6. Return to GSC → click Verify
        7. DNS propagation: 5 minutes to 24 hours

      Method C — HTML file upload:
        1. Download google[hashcode].html from GSC
        2. Place it in client/public/
        3. It will be served at https://globaltechtool.com/google[hashcode].html
        4. Click Verify in GSC

      SITEMAP URL TO SUBMIT IN GSC:
        https://globaltechtool.com/sitemap.xml
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
    <title>Global Tech Tools — Free AI Tools for Writers &amp; Students</title>

    <!--
      VERCEL PREVIEW URL REDIRECT
      ============================
      Redirects the known Vercel preview URL to the canonical domain so bots
      do not index duplicate content. Does not affect localhost or other previews.

      Vercel Dashboard steps to permanently fix:
        1. vercel.com → project → Settings → Domains
        2. Add "globaltechtool.com" as custom domain → set as Primary
        3. The .vercel.app URL will then automatically redirect to the custom domain
    -->
    <script>
      (function () {
        var h = window.location.hostname;
        if (h === 'tools-website-rosy-seven.vercel.app') {
          window.location.replace(
            'https://globaltechtool.com' +
            window.location.pathname +
            window.location.search +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
